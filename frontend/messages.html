<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">MySocial</div>
        <ul class="nav-links">
          <li><a href="feed.html">Feed</a></li>
        </ul>
      </nav>
    </header>

    <main style="display: flex">
      <aside class="sidebar" style="flex: 1">
        <h3>Chats</h3>
        <p>@user1</p>
        <p>@user2</p>
        <p>@user3</p>
      </aside>

      <section style="flex: 3; padding: 1rem">
        <h3>Chat with @user1</h3>
        <div class="post">Hi!</div>
        <div class="post">Hello 😊</div>

        <form>
          <input type="text" placeholder="Type a message..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
  </body>
</html>
